<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGOSF Player - High Damage Studios</title>
    <style>
        /* ==========================================================================
           SKIN: AGOSF BLACK & WHITE (Estilo Boceto de Cómic / Manga en Papel)
           ========================================================================== */

        body {
            /* Fondo de textura de papel */
            background-color: #4253A6;
            background-image: 
                radial-gradient(rgba(0, 0, 0, 0.03) 1px, transparent 0),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
            background-size: 8px 8px, 100% 20px;
            color: #111111;
            font-family: 'Comic Sans MS', 'Arial Black', sans-serif;
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
            margin: 0;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Barra lateral estilo bloc de notas */
        .sidebar {
            width: 280px;
            min-width: 280px;
            background: #BA2D2D;
            border-right: 2px solid #111111;
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            transition: transform 0.3s ease;
            z-index: 10;
            box-shadow: 4px 0px 0px rgba(0, 0, 0, 0.05);
            height: 100%;
        }

        .sidebar h3 {
            margin-top: 0;
            color: #111111;
            border-bottom: 2px solid #111111;
            padding-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-retorno p {
            font-size: 0.75rem;
            color: #ffffff;
            margin: 0 0 15px 0;
            text-align: center;
            border: 1.5px solid #111111;
            padding: 6px;
            background: #111111;
            font-weight: bold;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.15);
        }

        .playlist-container {
            flex-grow: 1;
            overflow-y: auto;
            margin-top: 10px;
        }

        .playlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffffff;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 6px;
            border: 1.5px solid #111111;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .playlist-item:hover, .playlist-item.active {
            background-color: #111111;
            color: #ffffff;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.2);
        }

        .song-title {
            font-size: 0.8rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 80%;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #111111;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .playlist-item:hover .remove-btn, .playlist-item.active .remove-btn {
            color: #ffffff;
        }

        /* EVITAMOS QUE ESTE CONTENEDOR COLAPSE EN MOBILE */
        .main-content {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
        }

        /* LA CARCASA DEL REPRODUCTOR (Estilo hoja de papel) */
        .player-card {
            background: #FAFAFA;
            padding: 30px;
            border-radius: 12px; 
            border: 2px solid #111111;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 85%;
            max-width: 310px;
            position: relative;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            background-color: #111111;
            color: #ffffff;
            font-size: 1.1rem;
            padding: 10px;
            border-radius: 6px;
            border: 1.5px solid #111111;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
        }

        p {
            color: #111111;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 25px;
            background-color: #f7f5f0;
            padding: 12px;
            border-radius: 6px;
            border: 1.5px solid #111111;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 1px 1px 3px rgba(0, 0, 0, 0.05);
        }

        /* Botón de carga */
        .file-upload-btn {
            background: #ffffff;
            color: #111111;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-block;
            margin-bottom: 25px;
            border: 1.5px solid #111111;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.15);
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .file-upload-btn:hover {
            background: #111111;
            color: #ffffff;
        }

        .file-upload-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px rgba(0, 0, 0, 0.15);
        }

        input[type="file"] {
            display: none !important;
        }

        audio {
            width: 100%;
            outline: none;
            filter: grayscale(1) contrast(1.2);
        }

        /* --- STICKER DE HENRY --- */
        .sticker-personaje {
            position: absolute;
            top: -15px;         
            right: -328px;       
            width: 290px;       
            height: auto;
            transform: rotate(6deg); 
            border: 2px solid #111111;
            background-color: #ffffff;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            z-index: 5;
            transition: transform 0.2s ease;
        }

        .sticker-personaje img {
            width: 100%;
            height: auto;
            display: block;
            filter: grayscale(1) contrast(1.3) brightness(0.95);
        }

        .reproduciendo {
            transform: scale(1.02) rotate(-0.5deg);
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
        }

        .reproduciendo .sticker-personaje {
            transform: rotate(-6deg) scale(1.08);
        }

        /* FORZAMOS VISIBILIDAD DEL BOTÓN MENÚ */
        .menu-toggle {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            background: #ffffff;
            border: 1.5px solid #111111;
            color: #111111;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            z-index: 20;
            box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }

        .menu-toggle:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px rgba(0, 0, 0, 0.15);
        }

        /* Adaptación móvil ultra-resistente */
        @media (max-width: 768px) {
            body { 
                flex-direction: column; 
                position: relative;
            }
            .sidebar { 
                position: absolute; 
                left: 0; 
                top: 0; 
                height: 100%; 
                transform: translateX(-100%); 
                padding-top: 80px; 
                width: 280px;
            }
            .sidebar.open { 
                transform: translateX(0); 
            }
            .main-content {
                width: 100vw;
                height: 100vh;
                position: absolute;
                top: 0;
                left: 0;
            }
            .menu-toggle { 
                display: block !important; /* Forzamos que aparezca */
            }
        }
    </style>
</head>
